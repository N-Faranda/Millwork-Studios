<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Millwork Studios — We build tools for the long work.</title>
<link rel="icon" type="image/png" href="assets/logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper: #f3f0e9;
    --paper-2: #ebe7dd;
    --ink: #111110;
    --ink-soft: #2a2925;
    --ink-mute: #7a766c;
    --ink-faint: #b8b3a6;
    --rule: rgba(17, 17, 16, 0.12);
    --rule-soft: rgba(17, 17, 16, 0.06);
    --accent: #b8451e;
    --sans: "Geist", ui-sans-serif, system-ui, sans-serif;
    --mono: "Geist Mono", ui-monospace, monospace;
    --serif: "Instrument Serif", "Times New Roman", serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  html, body { background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--sans);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  ::selection { background: var(--ink); color: var(--paper); }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image:
      radial-gradient(rgba(17,17,16,0.025) 1px, transparent 1px),
      radial-gradient(rgba(17,17,16,0.02) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: multiply;
    opacity: 0.6;
  }

  #root { position: relative; z-index: 2; }

  .kicker {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }

  .rule { height: 1px; background: var(--rule); width: 100%; }

  .container {
    width: 100%;
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 720px) { .container { padding: 0 20px; } }

  .splash {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  .splash.hidden { opacity: 0; visibility: hidden; }
  .splash-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ink);
    animation: splashPulse 1.2s ease-in-out infinite;
  }
  @keyframes splashPulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-dot"></div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/i18n.jsx"></script>
<script type="text/babel" src="src/windmill.jsx"></script>
<script type="text/babel" src="src/particles.jsx"></script>
<script type="text/babel" src="src/ascii.jsx"></script>
<script type="text/babel" src="src/sections.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

</body>
</html>
